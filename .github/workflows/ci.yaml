name: CI — Build & Push to Artifact Registry

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REGISTRY: asia-northeast3-docker.pkg.dev
  IMAGE_NAME: nginx-app

jobs:
  build-and-push:
    name: Build Docker Image & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/gke-portfolio-repo/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/gke-portfolio-repo/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/gke-portfolio-repo/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/gke-portfolio-repo/${{ env.IMAGE_NAME }}:latest

      - name: Update image tag in gitops-repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
          GITOPS_REPO: ${{ github.repository_owner }}/gke-gitops-manifests
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${GITOPS_REPO}.git gitops-repo
          cd gitops-repo
          sed -i "s|image: .*nginx-app:.*|image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/gke-portfolio-repo/${{ env.IMAGE_NAME }}:${IMAGE_TAG}|g" \
            apps/nginx-app/deployment.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions Bot"
          git add apps/nginx-app/deployment.yaml
          git commit -m "chore: update nginx-app image to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
